<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e17"/>
      <stop offset="100%" stop-color="#141b2d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#0099b8"/>
    </linearGradient>
    <linearGradient id="cell" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>
  <rect x="0" y="626" width="1200" height="4" fill="url(#accent)"/>
  <g transform="translate(60, 120)">
    <rect x="0" y="0" width="80" height="160" rx="8" fill="none" stroke="#22c55e" stroke-width="1.5" opacity="0.4"/>
    <rect x="4" y="4" width="72" height="120" rx="4" fill="url(#cell)" opacity="0.8"/>
    <rect x="16" y="14" width="16" height="8" rx="2" fill="#22c55e" opacity="0.6"/>
    <rect x="16" y="174" width="16" height="8" rx="2" fill="#22c55e" opacity="0.6"/>
    <text x="40" y="140" text-anchor="middle" font-size="28" font-weight="bold" fill="#4ade80" font-family="system-ui">85%</text>
  </g>
  <text x="180" y="200" font-size="56" font-weight="800" fill="#edf1f8" font-family="system-ui" letter-spacing="-1">EVPulse</text>
  <text x="180" y="270" font-size="28" font-weight="500" fill="#8b97b0" font-family="system-ui">EV Battery Technology Newsroom</text>
  <text x="180" y="315" font-size="22" fill="#4a5670" font-family="system-ui">&amp; Engineering Calculators</text>
  <g transform="translate(180, 360)">
    <rect x="0" y="0" width="200" height="40" rx="8" fill="#0099b8"/>
    <text x="100" y="25" text-anchor="middle" font-size="15" font-weight="700" fill="#000" font-family="system-ui">evpulse.co.in</text>
  </g>
  <g opacity="0.15">
    <line x1="180" y1="440" x2="400" y2="440" stroke="#00e5ff" stroke-width="1"/>
    <line x1="180" y1="450" x2="350" y2="450" stroke="#00e5ff" stroke-width="1"/>
    <line x1="180" y1="460" x2="380" y2="460" stroke="#00e5ff" stroke-width="1"/>
  </g>
  <g transform="translate(1050, 500)">
    <circle r="4" fill="#22c55e" opacity="0.5">
      <animate attributeName="r" values="4;8;4" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0;0.5" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
